[tips-and-tricks-item-description]
muria-briefing=[planet=muria]是顆充滿生機的劇毒世界。[tile=acidophile-lichen]與[entity=eschatotaxite]真菌覆蓋了整顆星球的陸地，而其餘地表則是覆蓋了[fluid=muriatic-solution]湖泊。 [entity=chlorine-salt-deposit]與[item=cotunnite]則是可以在地表透過不同方式找到的[fluid=chlorine]類鹽類。兩者皆可透過[entity=fungicultural-tower]與地衣淨化成礦石。務必小心地衣釋放的腐蝕性空氣，末世菌可以保護你的工廠免受其損害。
acid-immunity-list=採收[entity=metallic-lichen-colony]與[entity=cotunnite-lichen-colony]會釋放腐蝕性氣體。這些氣體會對大部分機器造成損害，地圖上的汙染覆蓋顯示則能透露出哪些區塊對你的機器具有危險性。透過採收與種植[entity=eschatotaxite]則可以減少腐蝕性大氣。\n玩家製造的大部分建築在[planet=muria]汙染區塊內都會受到腐蝕酸霧的持續傷害，但有少數例外。\n免疫設施清單=\n- [entity=acidworking-plant]與[entity=smelting-plant](注意: 這兩種機器實際上會排放腐蝕酸霧)。\n- [entity=biovat](生物培養槽會消耗空氣中的部分酸霧。).\n- 所有電力設施(電線杆、發電機與蓄電池)\n- [entity=burner-inserter]、[entity=inserter]、[entity=long-handed-inserter]、[entity=transport-belt]、[entity=fast-transport-belt]、[entity=underground-belt]與[entity=fast-underground-belt]。這些是唯一能在汙染區域內使用的物流設施。\n- 無人機會受到傷害，但無人機調度站除外。\n- 火車([entity=locomotive]、[item=rail]等)同樣在免疫清單內。\n- [entity=rocket-silo]、[entity=cargo-landing-pad]與[entity=cargo-bay]。\n- 所有種類採礦機。\n- [entity=beacon]. \n- 所有種類水管。

[planet-effect-alert]
muria-corrosive-effect-destroyed-entity=有一座機器已被穆里亞星的腐蝕酸霧摧毀。在穆里亞星上擁有汙染的區塊將會損壞絕大部分的機器，查看祕笈以獲取更多資訊。

