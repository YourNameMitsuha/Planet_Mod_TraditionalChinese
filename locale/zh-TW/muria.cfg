[entity-description]
acidworking-plant=允許更高級的酸液處理。該機器在穆里亞星上會產生酸霧並腐蝕附近的脆弱實體。
smelting-plant=結合了鑄造廠與熔爐，允許進行鉛金屬加工。該機器在穆里亞星上會產生酸霧並腐蝕附近的脆弱實體。
fungicultural-tower=經過改良的種植塔，專為種植真菌與地衣而設計。
acidthrower-turret=與火焰噴射砲塔相似，這座以酸液驅動的戰爭機器將會溶解你的敵人。
metallic-lichen-colony=生長在氯鹽上的嗜酸地衣菌落。
cotunnite-lichen-colony=生長在氯鉛上的嗜酸地衣菌落。
holmium-lichen-colony=生長在氯化鈥上的嗜酸地衣菌落。
eschatotaxite=高聳的真菌菌落，會消耗空氣中的腐蝕酸霧。
chlorine-salt-deposit=氯鹽礦床。
biovat=經過改良的生物室，使用末世菌而非未成熟五足蟲加工材料。效率較低但能利用穆里亞星當地資源進行製造。
big-chloric-rock=由氯鹽與石頭組成的巨大集合體。

