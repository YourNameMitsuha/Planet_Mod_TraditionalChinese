[technology-description]
planet-discovery-muria=這顆遙遠的星球覆蓋著具有強烈腐蝕性的[fluid=muriatic-solution]淺湖，其中揮發的氣體導致強烈的溫室效應從而維持著溫暖。湖中液體可透過[entity=offshore-pump]抽取。該星球表面似乎存在著生命跡象。
lichen-cultivation=[item=acidophile-lichen]似乎以[item=chlorine-salts]在金屬去[fluid=chlorine]過程中釋放的能量為食。藉由將鹽類放置在[tile=acidophile-lichen]上，我們便能在該星球上穩定獲取金屬。這些菌落確實會向空氣釋放極強的腐蝕性物質，這對工廠來說將是一項風險。
eschatotaxite-farming=以自身腐爛部位為食的高大真菌菌落。富含碳與硫磺。它們似乎會消耗[entity=metallic-lichen-colony]與[entity=cotunnite-lichen-colony]釋放的腐蝕酸霧。
lead-processing=將從[fluid=muriatic-solution]提取的[item=cotunnite]放置在[tile=acidophile-lichen]上，以釋放其中含有的[item=lead]並開始加工這類抗腐蝕金屬。
acidworking=研發能處理高腐蝕性材料的全新製程。[entity=acidworking-plant]運作時需要消耗[item=chloric-fuel]。
advanced-lead-processing=藉由[item=chloric-fuel]，我們可以在專業的[entity=smelting-plant]中啟用更高階的[item=lead]加工鏈。並與此同時研發鉛粒與重型霰彈彈藥。
muriatic-science-pack=允許更多劇毒與酸性物質的進階應用。
offworld-chlorane-production=在[planet=muria]以外的地方獲取並處理處理[fluid=chlorane]。
toxic-rounds-magazine=經過改造含有酸性填充物的子彈。
chlorane-explosives=[item=explosives]的替代配方，充分利用了[fluid=chlorane]的特性。
chlorane-lead-battery=[item=battery]的替代配方，利用了[item=lead-plate]。
acid-weaponization=開始構建進階化學軍械。
refined-acid-weaponry=提升酸性武器傷害。
hydronium-destruction-productivity=更先進的[fluid=hydronium]分解技術，使你能回收更多的[fluid=oxygen]與[fluid=hydrogen]分子。
oxygenated-bacteria-cultivation=透過在細菌培養環境中添加氧氣，我們可以提升菌落培養產量。
holmium-chloride=透過對氯鹽的深入研究，使你能人工合成氯化鈥以拓展鈥加工鏈，並提升弗戈拉星的鈥產量。同時我們也獲得了人工建造地衣菌落的能力，使其能存活於弗戈拉星的油海與穆里亞星的鹽酸湖深處。
shotgun-turret=經過改裝的機槍砲塔設計，能夠發射強力打擊的霰彈。
advanced-paste-applications=透過應用末世菌泥的多種特性，我們可以在重要製程中取代塑膠與玉瑪果泥。
shotgun-turret-damage=提升霰彈砲塔傷害。
murian-oil-processing=藉由將末世真菌產出的末世菌泥和硫磺，結合其他穆里亞星資源並一同加工，我們可以輕鬆獲得原油與其他石化產品。
leaded-fuel=藉由利用鉛粒，我們可以製造出火箭燃料的替代品。該燃料具有驚人的加速度，但也會造成巨量的汙染倍率。

